name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & dbt compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          run: pip install ruff "dbt-bigquery==1.8.2" "protobuf>=3.20.0,<5.0.0"

      - name: Lint
        run: ruff check scraper/ ai_enrichment/

      - name: Write GCP credentials
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_credentials.json" >> $GITHUB_ENV
          echo "DBT_PROFILES_DIR=$GITHUB_WORKSPACE/dbt_transformation" >> $GITHUB_ENV
          echo "BQ_PROJECT=${{ secrets.BQ_PROJECT }}" >> $GITHUB_ENV

      - name: dbt deps
        working-directory: dbt_transformation
        run: dbt deps

      - name: dbt compile
        working-directory: dbt_transformation
        run: dbt compile --no-partial-parse