name: CD

on:
  push:
    branches: [main]
    paths:
      - "dbt_transformation/**"
      - "scraper/**"
      - "ai_enrichment/**"

jobs:
  dbt_build:
    name: dbt production build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install "dbt-bigquery==1.11.1"

      - name: Write GCP credentials
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_credentials.json" >> $GITHUB_ENV
          echo "DBT_PROFILES_DIR=$GITHUB_WORKSPACE/dbt_transformation" >> $GITHUB_ENV
          echo "BQ_PROJECT=${{ secrets.BQ_PROJECT }}" >> $GITHUB_ENV

      - name: dbt deps
        working-directory: dbt_transformation
        run: dbt deps

      - name: dbt build
        working-directory: dbt_transformation
        run: dbt build --no-partial-parse --fail-fast
